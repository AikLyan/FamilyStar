<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f7fb;
}

.header{
  background:#1e3a8a;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;
}

.icon{font-size:40px;}
.title{font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<div class="header">Shop</div>

<div class="grid">

  <div class="card" onclick="openCat('store')">
    <div class="icon">🛒</div>
    <div class="title">Store</div>
  </div>

  <div class="card" onclick="openCat('digital')">
    <div class="icon">💎</div>
    <div class="title">Digital</div>
  </div>

  <div class="card" onclick="openCat('market')">
    <div class="icon">🏪</div>
    <div class="title">Market</div>
  </div>

  <div class="card" onclick="openCat('delivery')">
    <div class="icon">🚚</div>
    <div class="title">Delivery</div>
  </div>

</div>

<script>
function openCat(type){
  localStorage.setItem("shopCategory", type);
  location.href = "products.html";
}
</script>

</body>
</html>
