<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family Star Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

.card{
width:90%;
max-width:380px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 8px 30px rgba(0,0,0,.3);
}

.logo{
font-size:55px;
margin-bottom:10px;
}

.title{
font-size:34px;
font-weight:bold;
margin-bottom:8px;
}

.family{
color:#3b82f6;
}

.star-wrap{
position:relative;
display:inline-block;
}

.star-text{
color:#ef4444;
}

.logo-star{
position:absolute;
top:-12px;
right:-12px;
font-size:15px;
color:#ef4444;
}

.subtitle{
color:#dbeafe;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:12px;
font-size:16px;
outline:none;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
opacity:.9;
}

.register{
margin-top:15px;
}

.register a{
color:white;
text-decoration:none;
font-weight:bold;
}

.version{
margin-top:20px;
font-size:12px;
color:#cbd5e1;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">🌟</div>

<div class="title">
<span class="family">Family</span>
<span class="star-wrap">
<span class="star-text">Star</span>
<span class="logo-star">★</span>
</span>
</div>

<div class="subtitle">
Welcome Back
</div>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button
class="login-btn"
onclick="login()">
Login
</button>
