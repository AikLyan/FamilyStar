<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f1f5f9;
}

.header{
  background:#1e3a8a;
  color:white;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.logout{
  padding:15px;
}

button{
  width:100%;
  padding:12px;
  background:#e11d48;
  color:white;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:15px;
}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h2{
  margin:0;
}
</style>
</head>

<body>

<div class="header">
🛠 Admin Dashboard
</div>

<!-- STATS -->
<div class="stats">
  <div class="box">
    <h2 id="userCount">0</h2>
    <p>Users</p>
  </div>

  <div class="box">
    <h2 id="orderCount">0</h2>
    <p>Orders</p>
  </div>

  <div class="box">
    <h2 id="productCount">0</h2>
    <p>Products</p>
  </div>
</div>

<!-- MENU -->
<div class="grid">

  <div class="card" onclick="location.href='admin-orders.html'">
    📦 Orders
  </div>

  <div class="card" onclick="location.href='admin-products.html'">
    🛒 Products
  </div>

  <div class="card" onclick="location.href='admin-users.html'">
    👥 Users
  </div>

  <div class="card" onclick="location.href='admin-wallet.html'">
    💰 Wallet
  </div>

</div>

<div class="logout">
<button onclick="logout()">Logout</button>
</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

/* CHECK ADMIN */
const role = localStorage.getItem("role");
if(role !== "admin"){
  location.href = "index.html";
}

/* LOAD STATS */
async function loadStats(){

  const users = await getDocs(collection(db,"users"));
  const orders = await getDocs(collection(db,"orders"));
  const products = await getDocs(collection(db,"product"));

  document.getElementById("userCount").innerText = users.size;
  document.getElementById("orderCount").innerText = orders.size;
  document.getElementById("productCount").innerText = products.size;
}

loadStats();

/* LOGOUT */
window.logout = function(){
  localStorage.clear();
  location.href = "index.html";
};
</script>

</body>
</html>
