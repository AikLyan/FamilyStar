<title>Family Star</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#f3f6ff;
padding-bottom:80px;
}

/* HEADER */
.header{
background:#2563eb;
color:white;
padding:22px;
text-align:center;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
}

/* USER CARD */
.card{
width:92%;
margin:15px auto;
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:center;
position:relative;
}

#username{
font-size:20px;
font-weight:bold;
}

#balance{
font-size:36px;
color:#1d4ed8;
font-weight:bold;
margin-top:10px;
}

#point{
position:absolute;
right:12px;
bottom:12px;
background:#dbeafe;
padding:5px 10px;
border-radius:12px;
font-size:12px;
color:#1d4ed8;
}

/* ADS SLIDER */
.slider{
width:92%;
margin:15px auto;
overflow:hidden;
border-radius:15px;
}

.slides{
display:flex;
width:300%;
animation:slide 9s infinite;
}

.slide{
width:100%;
flex-shrink:0;
padding:20px;
color:white;
font-weight:bold;
text-align:center;
font-size:18px;
}

.s1{background:#ef4444;}
.s2{background:#10b981;}
.s3{background:#f59e0b;}

@keyframes slide{
0%{transform:translateX(0);}
33%{transform:translateX(-100%);}
66%{transform:translateX(-200%);}
100%{transform:translateX(0);}
}

/* MENU */
.menu{
width:92%;
margin:20px auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.item{
background:white;
padding:20px;
border-radius:18px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.circle{
width:60px;
height:60px;
margin:0 auto 10px;
border-radius:50%;

.ads{

padding:15px;
border-radius:15px;
text-align:center;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.08);

66%{opacity:1;}

.item:hover{

justify-content:space-around;
