<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Star</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef2ff;
padding-bottom:80px;
}

/* HEADER */
.header{
background:#1e40af;
color:white;
padding:20px;
text-align:center;
font-weight:bold;
}

/* CARD */
.card{
width:92%;
margin:15px auto;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
padding:22px;
border-radius:18px;
text-align:center;
position:relative;
}

#username{
font-size:18px;
opacity:0.9;
}

#balance{
font-size:38px;
font-weight:bold;
margin-top:10px;
}

#point{
position:absolute;
right:12px;
bottom:12px;
background:rgba(255,255,255,0.2);
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

/* MENU */
.menu{
width:92%;
margin:20px auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.item{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.2s;
font-weight:600;
}

.item:hover{
transform:scale(1.05);
}

.icon{
width:55px;
height:55px;
margin:auto;
border-radius:50%;
background:#dbeafe;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:8px;
}

/* ICON STYLE */
.material-symbols-rounded{
font-size:28px;
color:#1d4ed8;
}
