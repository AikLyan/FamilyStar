<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Star</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#eef2ff;
padding-bottom:80px;
}

/* HEADER */
.header{
background:#1e40af;
color:white;
padding:20px;
text-align:center;
font-weight:bold;
}

/* CARD */
.card{
width:92%;
margin:15px auto;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
color:white;
padding:22px;
border-radius:18px;
text-align:center;
position:relative;
}

#username{
font-size:18px;
opacity:0.9;
}

#balance{
font-size:38px;
font-weight:bold;
margin-top:10px;
}

#point{
position:absolute;
right:12px;
bottom:12px;
background:rgba(255,255,255,0.2);
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

/* MENU */
.menu{
width:92%;
margin:20px auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.item{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.2s;
font-weight:600;
}

.item:hover{
transform:scale(1.05);
}

.icon{
width:55px;
height:55px;
margin:auto;
border-radius:50%;
background:#dbeafe;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:8px;
}

/* ICON STYLE */
.material-symbols-rounded{
font-size:28px;
color:#1d4ed8;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
font-size:12px;
box-shadow:0 -5px 15px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<script>
const user = localStorage.getItem("username");
if(!user){
window.location.href="index.html";
}
</script>

<div class="header">
🌟 Family Star
</div>

<div class="card">
<div id="username">Loading...</div>
<div id="balance">0 MMK</div>
<div id="point">0 PT</div>
</div>

<!-- MENU -->
<div class="menu">

<div class="item">
<div class="icon"><span class="material-symbols-rounded">directions_car</span></div>
Ride
</div>

<div class="item">
<div class="icon"><span class="material-symbols-rounded">account_balance_wallet</span></div>
Wallet
</div>

<div class="item">
<div class="icon"><span class="material-symbols-rounded">local_shipping</span></div>
Delivery
</div>

<div class="item">
<div class="icon"><span class="material-symbols-rounded">confirmation_number</span></div>
Ticket
</div>

</div>

<div class="footer">
<div>Home</div>
<div>Wallet</div>
<div>Orders</div>
<div>Profile</div>
</div>

<script>
document.getElementById("username").innerText =
"Welcome " + localStorage.getItem("username");
</script>

</body>
</html>
